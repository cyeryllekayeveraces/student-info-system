<!DOCTYPE html>
<html>
<head>
  <title>Student Information System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Information System</h1>

<div class="form">
  <input type="text" id="student_id" placeholder="Student ID">
  <input type="text" id="first_name" placeholder="First Name">
  <input type="text" id="last_name" placeholder="Last Name">
  <input type="text" id="gender" placeholder="Gender">
  <input type="date" id="birthdate">
  <input type="text" id="address" placeholder="Address">
  <input type="text" id="contact_number" placeholder="Contact Number">
  <input type="text" id="course_id" placeholder="Course ID">
  <input type="text" id="course_name" placeholder="Course Name">
  <input type="text" id="course_code" placeholder="Course Code">
  <input type="text" id="enrollment_id" placeholder="Enrollment ID">

  <button onclick="addStudent()">Save Student</button>
</div>

<input type="text" id="search" placeholder="Search by name..." onkeyup="searchStudent()">

<h2>Student List</h2>

<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Course</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="studentTable"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
